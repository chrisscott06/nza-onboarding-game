<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZA Onboarding Game</title>

  <!-- NZA type system: DM Serif Display (display), Inter (body/UI),
       IBM Plex Mono (data/score). All SIL OFL — logged in CREDITS.md. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      /* NZA design system */
      --navy:   #0b1220;
      --navy-2: #131d33;
      --line:   #24304d;
      --teal:   #2dd4bf;
      --purple: #c084fc;
      --coral:  #fb7185;
      --cream:  #f5f1e6;

      --font-display: "DM Serif Display", Georgia, serif;
      --font-ui: "Inter", system-ui, sans-serif;
      --font-mono: "IBM Plex Mono", ui-monospace, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--navy);
      color: var(--cream);
      font-family: var(--font-ui);
      overflow: hidden;
    }
    #stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
    }
    #game {
      /* Keep the 16:9 buffer's aspect ratio; letterbox within any viewport. */
      width: min(100vw, 177.78vh);
      height: min(56.25vw, 100vh);
      image-rendering: pixelated;
      background: #1a2438;
      touch-action: none;
    }
    #hint {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      opacity: 0.5;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* Menu button shown only while playing */
    #sound-btn {
      position: fixed;
      top: 14px; right: 14px;
      z-index: 11;
      width: 42px; height: 42px;
      display: grid; place-items: center;
      background: #131d33cc;
      color: var(--cream);
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    #sound-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--teal); }

    #menu-btn {
      position: fixed;
      top: 14px; right: 66px;
      z-index: 9;
      display: none;
      background: #131d33cc;
      color: var(--cream);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    #menu-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--teal); }
    body.playing #menu-btn { display: block; }
    body.playing #hint { display: block; }
    body:not(.playing) #hint { display: none; }

    /* ---- Touch controls (Part H) ---- */
    #touch {
      position: fixed;
      left: 0; right: 0; bottom: 22px;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 22px;
      z-index: 8;
      pointer-events: none; /* only the buttons catch input */
    }
    #touch .pad { display: flex; gap: 16px; }
    .tbtn {
      pointer-events: auto;
      width: 70px; height: 70px;
      border-radius: 50%;
      background: #131d33cc;
      border: 1px solid var(--line);
      color: var(--cream);
      font-family: var(--font-ui);
      font-size: 24px;
      line-height: 1;
      display: grid; place-items: center;
      backdrop-filter: blur(4px);
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      cursor: pointer;
    }
    .tbtn.jump {
      width: 88px; height: 88px;
      background: rgba(45, 212, 191, 0.14);
      border-color: rgba(45, 212, 191, 0.5);
      color: var(--teal);
      font-size: 15px;
      letter-spacing: 0.08em;
    }
    .tbtn.active { background: rgba(94, 234, 212, 0.3); }
    #touch .pad-right { display: flex; gap: 16px; align-items: flex-end; pointer-events: none; }
    .tbtn.dash {
      width: 70px; height: 70px;
      background: rgba(165, 243, 252, 0.16);
      border-color: rgba(165, 243, 252, 0.6);
      color: #a5f3fc;
      font-size: 24px;
      display: none; /* shown only when a grid-surge / fire is available */
      flex-direction: column; gap: 0;
    }
    .tbtn.dash .lbl { font-size: 9px; letter-spacing: 0.1em; opacity: 0.9; margin-top: 1px; }
    body.surge-ready .tbtn.dash { display: grid; place-items: center; animation: dash-ready 1s ease-in-out infinite; }
    @keyframes dash-ready {
      0%, 100% { box-shadow: 0 0 0 0 rgba(165,243,252,0.0); }
      50% { box-shadow: 0 0 16px 3px rgba(165,243,252,0.55); }
    }
    @media (prefers-reduced-motion: reduce) {
      body.surge-ready .tbtn.dash { animation: none; box-shadow: 0 0 12px 2px rgba(165,243,252,0.4); }
    }
    body.playing #touch { display: flex; }
    /* Hide on desktops with a real mouse + room for a keyboard. */
    @media (pointer: fine) and (min-width: 820px) {
      body.playing #touch { display: none; }
    }
    /* On touch / small screens the on-screen buttons replace the keyboard hint. */
    @media (pointer: coarse), (max-width: 819px) {
      body.playing #hint { display: none; }
    }

    /* ---- Cutscene / dialogue box ---- */
    #cutscene {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 19;
      display: flex; justify-content: center;
      padding: 0 16px 18px; cursor: pointer;
    }
    #cutscene[hidden] { display: none; }
    .cs-box {
      display: flex; gap: 14px; align-items: flex-start;
      width: 100%; max-width: 720px;
      background: rgba(11, 18, 32, 0.94);
      border: 2px solid var(--teal);
      box-shadow: inset 0 0 0 4px #0b1220;
      border-radius: 10px; padding: 14px 16px;
    }
    .cs-portrait {
      flex: 0 0 56px; width: 56px; height: 56px; border-radius: 8px;
      display: grid; place-items: center;
      font-family: var(--font-display); font-size: 30px; color: #0b1220;
      background: var(--p, var(--teal));
      overflow: hidden;
    }
    .cs-portrait img { width: 100%; height: 100%; object-fit: contain; padding: 6px; box-sizing: border-box; }
    .cs-body { flex: 1; min-width: 0; }
    .cs-name {
      font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--teal); margin-bottom: 5px;
    }
    .cs-text { font-family: var(--font-ui); font-size: 15px; line-height: 1.45; color: var(--cream); }
    .cs-hint { margin-top: 8px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; opacity: 0.45; }

    /* ---- Boot / intro screen — NZA mark "fills with energy", then the
           NET ZERO HERO wordmark reveals (matches the nza-website preloader,
           in the game's palette: navy bg, teal fill, cream + teal words). ---- */
    #boot {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 24px; cursor: pointer;
      background: radial-gradient(120% 120% at 50% 38%, #16203a 0%, #0b1220 75%);
    }
    #boot[hidden] { display: none; }

    /* MARK — two stacked layers: a faint hollow outline + a bright teal fill
       that clip-paths from the bottom up ("glass filling with energy"). */
    #boot .boot-mark { position: relative; width: clamp(120px, 19vw, 188px); aspect-ratio: 1 / 1; }
    #boot .boot-mark svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    #boot .boot-mark-hollow { color: var(--cream); opacity: 0.16; }
    #boot .boot-mark-fill {
      color: var(--teal);
      clip-path: inset(100% 0 0 0);
      animation: boot-fill 2200ms cubic-bezier(0.55, 0, 0.95, 0.5) forwards;
    }
    @keyframes boot-fill { to { clip-path: inset(0 0 0 0); } }

    /* PERCENT COUNTER — mono, ticks 0→100% over the fill (JS-driven), fades out. */
    #boot .boot-counter {
      font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.2em;
      color: rgba(245, 241, 230, 0.5); min-height: 1.2em;
      animation: boot-counter-fade 2300ms ease forwards;
    }
    @keyframes boot-counter-fade { 0%, 86% { opacity: 1; } 100% { opacity: 0; } }

    /* WORDMARK — "Net" + "Zero" rise up from below; "Hero" mask-reveals in teal. */
    #boot .boot-title {
      margin: 0; display: flex; gap: 0.26em; align-items: baseline; justify-content: center;
      font-family: var(--font-display); font-weight: 400;
      font-size: clamp(34px, 7.5vw, 66px); line-height: 1; letter-spacing: 0.01em;
    }
    #boot .bw { display: inline-block; overflow: hidden; padding: 0 0.04em; }
    #boot .bw-in {
      display: inline-block; color: var(--cream);
      transform: translateY(115%); opacity: 0;
      animation: boot-rise 700ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    #boot .bw-in.net  { animation-delay: 2000ms; }
    #boot .bw-in.zero { animation-delay: 2350ms; }
    @keyframes boot-rise { to { transform: translateY(0); opacity: 1; } }
    #boot .bw-mask {
      position: relative; display: inline-block; color: var(--teal);
      clip-path: inset(0 100% 0 0);
      animation: boot-mask-text 1000ms cubic-bezier(0.7, 0, 0.3, 1) 2900ms forwards;
    }
    #boot .bw-mask::after {
      content: ''; position: absolute; top: 0; bottom: 0; left: 0; width: 0;
      background: var(--teal);
      animation: boot-mask-slab 1000ms cubic-bezier(0.7, 0, 0.3, 1) 2900ms forwards;
    }
    @keyframes boot-mask-text { to { clip-path: inset(0 0 0 0); } }
    @keyframes boot-mask-slab { 0% { width: 0; left: 0; } 50% { width: 100%; left: 0; } 100% { width: 0; left: 100%; } }

    /* PROMPTS — appear once the wordmark has landed. */
    #boot .boot-press {
      margin: 14px 0 0; font-family: var(--font-mono); font-size: 16px;
      letter-spacing: 0.34em; color: var(--teal); text-transform: uppercase;
      opacity: 0; animation: boot-prompt-in 500ms ease 3900ms forwards, boot-blink 1.1s steps(1) 4400ms infinite;
    }
    #boot .boot-hint {
      margin: 4px 0 0; font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.16em; opacity: 0; text-transform: uppercase;
      animation: boot-hint-in 500ms ease 4100ms forwards;
    }
    @keyframes boot-prompt-in { to { opacity: 1; } }
    @keyframes boot-hint-in { to { opacity: 0.4; } }
    @keyframes boot-blink { 0%, 60% { opacity: 1; } 61%, 100% { opacity: 0.25; } }

    /* ---- Retro pixel transition overlay ---- */
    #transition {
      position: fixed; inset: 0; z-index: 40; pointer-events: none;
      width: 100vw; height: 100vh;
      image-rendering: pixelated; image-rendering: crisp-edges;
    }
    #transition[hidden] { display: none; }

    /* ---- Win / celebration overlay ---- */
    #win {
      position: fixed; inset: 0; z-index: 20;
      display: grid; place-items: center;
      padding: 24px;
      background: rgba(7, 12, 22, 0.82);
      backdrop-filter: blur(3px);
    }
    #win[hidden] { display: none; }
    .win-card {
      text-align: center;
      max-width: 460px; width: 100%;
      background: rgba(11, 18, 32, 0.92);
      border: 2px solid var(--teal);
      box-shadow: inset 0 0 0 4px #0b1220, 0 0 40px rgba(45, 212, 191, 0.25);
      border-radius: 12px;
      padding: 30px 28px 26px;
    }
    .win-badge { font-size: 40px; margin-bottom: 6px; }
    .win-title {
      margin: 0 0 6px;
      font-family: var(--font-display); font-weight: 400;
      font-size: clamp(26px, 5vw, 40px);
      color: var(--teal);
    }
    .win-sub {
      margin: 0 0 18px; font-family: var(--font-mono);
      font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
      opacity: 0.6;
    }
    .win-score { margin-bottom: 22px; }
    .win-score-label {
      display: block; font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.3em; opacity: 0.55; margin-bottom: 4px;
    }
    .win-score-val {
      font-family: var(--font-mono); font-weight: 600;
      font-size: 56px; color: var(--cream); line-height: 1;
    }
    .win-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .win-btn {
      font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.06em;
      padding: 12px 18px; border-radius: 10px; cursor: pointer;
      background: #131d33; border: 1px solid var(--line); color: var(--cream);
    }
    .win-btn.primary { background: rgba(45, 212, 191, 0.16); border-color: rgba(45, 212, 191, 0.6); color: var(--teal); }
    .win-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--teal); }

    @media (prefers-reduced-motion: reduce) {
      #boot .boot-mark-fill { animation: none; clip-path: inset(0 0 0 0); }
      #boot .boot-counter { animation: none; opacity: 0; }
      #boot .bw-in { animation: none; transform: none; opacity: 1; }
      #boot .bw-mask { animation: none; clip-path: inset(0 0 0 0); }
      #boot .bw-mask::after { animation: none; width: 0; }
      #boot .boot-press { animation: none; opacity: 1; }
      #boot .boot-hint { animation: none; opacity: 0.4; }
    }
  </style>
</head>
<body>
  <!-- Boot / intro: the NZA mark fills with energy, then NET ZERO HERO reveals
       (same style as the nza-website preloader, in the game's palette). -->
  <div id="boot">
    <div class="boot-mark" aria-hidden="true">
      <svg class="boot-mark-hollow" viewBox="0 0 266.99 267" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
        <path d="M133.49,267C59.88,267,0,207.11,0,133.5S59.88,0,133.49,0s133.5,59.89,133.5,133.5-59.89,133.5-133.5,133.5ZM133.49,9.98c-68.11,0-123.52,55.41-123.52,123.52s55.41,123.52,123.52,123.52,123.52-55.41,123.52-123.52S201.6,9.98,133.5,9.98h0Z"/>
        <path d="M196.16,151.02l-8.05-10-54.23-67.41c-.2-.25-.58-.25-.78,0l-54.23,67.41-8.05,10-36.7,45.61c-.26.33-.03.81.39.81h197.95c.42,0,.65-.49.39-.81l-36.7-45.61ZM55.39,187.44c-.42,0-.65-.49-.39-.81l28.65-35.61,8.05-10,41.4-51.46c.2-.25.58-.25.78,0l41.4,51.46,8.05,10,28.65,35.61c.26.33.03.81-.39.81H55.39Z"/>
        <path d="M155.91,143.02h-12.84l-9.19-11.43c-.2-.25-.58-.25-.78,0l-9.19,11.43h-12.84l22.03-27.38c.2-.25.58-.25.78,0l22.03,27.38Z"/>
        <path d="M133.1,29.19l-98.98,123.01c-.26.33-.03.81.39.81h197.95c.42,0,.65-.49.39-.81L133.88,29.19c-.2-.25-.58-.25-.78,0ZM55,142.21l78.1-97.06c.2-.25.58-.25.78,0l78.1,97.06c.26.33.03.81-.39.81H55.39c-.42,0-.65-.49-.39-.81Z"/>
      </svg>
      <svg class="boot-mark-fill" viewBox="0 0 266.99 267" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
        <path d="M133.49,267C59.88,267,0,207.11,0,133.5S59.88,0,133.49,0s133.5,59.89,133.5,133.5-59.89,133.5-133.5,133.5ZM133.49,9.98c-68.11,0-123.52,55.41-123.52,123.52s55.41,123.52,123.52,123.52,123.52-55.41,123.52-123.52S201.6,9.98,133.5,9.98h0Z"/>
        <path d="M196.16,151.02l-8.05-10-54.23-67.41c-.2-.25-.58-.25-.78,0l-54.23,67.41-8.05,10-36.7,45.61c-.26.33-.03.81.39.81h197.95c.42,0,.65-.49.39-.81l-36.7-45.61ZM55.39,187.44c-.42,0-.65-.49-.39-.81l28.65-35.61,8.05-10,41.4-51.46c.2-.25.58-.25.78,0l41.4,51.46,8.05,10,28.65,35.61c.26.33.03.81-.39.81H55.39Z"/>
        <path d="M155.91,143.02h-12.84l-9.19-11.43c-.2-.25-.58-.25-.78,0l-9.19,11.43h-12.84l22.03-27.38c.2-.25.58-.25.78,0l22.03,27.38Z"/>
        <path d="M133.1,29.19l-98.98,123.01c-.26.33-.03.81.39.81h197.95c.42,0,.65-.49.39-.81L133.88,29.19c-.2-.25-.58-.25-.78,0ZM55,142.21l78.1-97.06c.2-.25.58-.25.78,0l78.1,97.06c.26.33.03.81-.39.81H55.39c-.42,0-.65-.49-.39-.81Z"/>
      </svg>
    </div>
    <div class="boot-counter" id="boot-counter">000%</div>
    <h1 class="boot-title" aria-label="Net Zero Hero">
      <span class="bw"><span class="bw-in net">Net</span></span>
      <span class="bw"><span class="bw-in zero">Zero</span></span>
      <span class="bw-mask hero">Hero</span>
    </h1>
    <p class="boot-press">Press Start</p>
    <p class="boot-hint">click or press any key</p>
  </div>

  <div id="stage">
    <canvas id="game" width="960" height="540"></canvas>
  </div>

  <!-- Retro pixel transition overlay (drawn by src/transition.js). -->
  <canvas id="transition" hidden></canvas>

  <button id="sound-btn" aria-label="Toggle sound">🔊</button>
  <button id="menu-btn" aria-label="Back to level menu">☰ Menu</button>
  <div id="hint">← → move &nbsp;·&nbsp; ↑ / space jump &nbsp;·&nbsp; shift ⚡ fire / dash &nbsp;·&nbsp; enter talk</div>

  <!-- On-screen touch controls (shown on touch devices / small screens). -->
  <div id="touch">
    <div class="pad">
      <button class="tbtn" data-action="left" aria-label="Move left">◄</button>
      <button class="tbtn" data-action="right" aria-label="Move right">►</button>
    </div>
    <div class="pad-right">
      <button class="tbtn dash" data-action="dash" aria-label="Grid-surge dash"><span class="ic">⚡</span><span class="lbl">DASH</span></button>
      <button class="tbtn jump" data-action="jump" aria-label="Jump">JUMP</button>
    </div>
  </div>

  <!-- The home screen is the 2D world hub itself (see levels/level-hub). This
       empty shell only satisfies legacy show/hide references in game.js. -->
  <div id="menu" hidden></div>

  <!-- (Cutscenes are staged in-world by the engine — no bottom dialogue box.) -->

  <!-- Win / celebration overlay (shown when you reach the goal). -->
  <div id="win" hidden>
    <div class="win-card">
      <div class="win-badge">🏁</div>
      <h2 class="win-title">Grid Decarbonised!</h2>
      <p class="win-sub">Clean power banked · gas retired</p>
      <div class="win-score">
        <span class="win-score-label">SCORE</span>
        <span class="win-score-val" id="win-score">0</span>
      </div>
      <div class="win-actions">
        <button id="win-again" class="win-btn">↻ Play again</button>
        <button id="win-menu" class="win-btn primary">↩ Menu</button>
      </div>
    </div>
  </div>

  <!--
    Plain web: no build tool, no framework. Load order matters
    (input → face → engine → game). We load them with a tiny inline loader that
    adds a cache-busting query, so editing any of these files and reloading
    shows the change immediately — no hard-refresh needed. That edit → reload →
    changed loop is the whole point of the project.
  -->
  <script>
    (function loadGame() {
      var scripts = [
        'src/engine/input.js',
        'src/audio.js',
        'src/face.js',
        'src/engine/engine.js',
        'src/transition.js',
        'src/game.js',
      ];
      var bust = '?_=' + Date.now();
      (function next(i, attempt) {
        if (i >= scripts.length) return;
        var s = document.createElement('script');
        s.src = scripts[i] + bust + (attempt ? '&r=' + attempt : '');
        s.onload = function () { next(i + 1, 0); };
        s.onerror = function () {
          s.remove();
          if ((attempt || 0) < 3) {
            setTimeout(function () { next(i, (attempt || 0) + 1); }, 200); // retry transient failures
          } else {
            console.error('[NZA] gave up loading', scripts[i]);
            next(i + 1, 0); // don't let one script block the rest
          }
        };
        document.body.appendChild(s);
      })(0, 0);
    })();
  </script>
</body>
</html>
