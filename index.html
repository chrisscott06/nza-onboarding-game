<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZA Onboarding Game</title>

  <!-- NZA type system: DM Serif Display (display), Inter (body/UI),
       IBM Plex Mono (data/score). All SIL OFL — logged in CREDITS.md. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      /* NZA design system */
      --navy:   #0b1220;
      --navy-2: #131d33;
      --line:   #24304d;
      --teal:   #2dd4bf;
      --purple: #c084fc;
      --coral:  #fb7185;
      --cream:  #f5f1e6;

      --font-display: "DM Serif Display", Georgia, serif;
      --font-ui: "Inter", system-ui, sans-serif;
      --font-mono: "IBM Plex Mono", ui-monospace, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--navy);
      color: var(--cream);
      font-family: var(--font-ui);
      overflow: hidden;
    }
    #stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
    }
    #game {
      /* Keep the 16:9 buffer's aspect ratio; letterbox within any viewport. */
      width: min(100vw, 177.78vh);
      height: min(56.25vw, 100vh);
      image-rendering: pixelated;
      background: #1a2438;
      touch-action: none;
    }
    #hint {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      opacity: 0.5;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ---- Level picker (home screen) ---- */
    #menu {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 24px;
      background: radial-gradient(120% 120% at 50% 0%, #16203a 0%, #0b1220 72%);
      z-index: 10;
    }
    #menu .brand-mark {
      width: 64px;
      height: 64px;
      opacity: 0.95;
      margin-bottom: 2px;
    }
    #menu h1 {
      margin: 0;
      font-family: var(--font-display);
      font-weight: 400; /* DM Serif Display: 400 only, never bold */
      font-size: clamp(30px, 6.4vw, 58px);
      line-height: 1.04;
      letter-spacing: 0.005em;
      text-align: center;
    }
    #menu h1 .accent { color: var(--teal); }
    #menu .tagline {
      margin: -10px 0 6px;
      font-family: var(--font-mono);
      opacity: 0.55;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    #level-list {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      max-width: 760px;
    }
    .level-card {
      width: 230px;
      min-height: 84px;
      text-align: left;
      background: var(--navy-2);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent, var(--teal));
      border-radius: 14px;
      padding: 16px 18px;
      color: var(--cream);
      cursor: pointer;
      font: inherit;
      transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease;
    }
    .level-card:hover,
    .level-card:focus-visible {
      transform: translateY(-3px);
      background: #18233d;
      border-color: var(--accent, var(--teal));
      outline: none;
    }
    .level-card:focus-visible { box-shadow: 0 0 0 2px var(--accent, var(--teal)); }
    .level-card .name {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 22px;
      margin-bottom: 6px;
    }
    .level-card .meta {
      font-family: var(--font-mono);
      font-size: 11px;
      opacity: 0.6;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .level-card .swatch {
      display: inline-block; width: 9px; height: 9px; border-radius: 2px;
      background: var(--accent, var(--teal)); margin-right: 7px; vertical-align: middle;
    }
    #menu .footer {
      position: absolute;
      bottom: 18px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.32;
    }

    /* Menu button shown only while playing */
    #menu-btn {
      position: fixed;
      top: 14px; right: 14px;
      z-index: 9;
      display: none;
      background: #131d33cc;
      color: var(--cream);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    #menu-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--teal); }
    body.playing #menu-btn { display: block; }
    body.playing #hint { display: block; }
    body:not(.playing) #hint { display: none; }

    /* ---- Touch controls (Part H) ---- */
    #touch {
      position: fixed;
      left: 0; right: 0; bottom: 22px;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 22px;
      z-index: 8;
      pointer-events: none; /* only the buttons catch input */
    }
    #touch .pad { display: flex; gap: 16px; }
    .tbtn {
      pointer-events: auto;
      width: 70px; height: 70px;
      border-radius: 50%;
      background: #131d33cc;
      border: 1px solid var(--line);
      color: var(--cream);
      font-family: var(--font-ui);
      font-size: 24px;
      line-height: 1;
      display: grid; place-items: center;
      backdrop-filter: blur(4px);
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      cursor: pointer;
    }
    .tbtn.jump {
      width: 88px; height: 88px;
      background: rgba(45, 212, 191, 0.14);
      border-color: rgba(45, 212, 191, 0.5);
      color: var(--teal);
      font-size: 15px;
      letter-spacing: 0.08em;
    }
    .tbtn.active { background: rgba(94, 234, 212, 0.3); }
    body.playing #touch { display: flex; }
    /* Hide on desktops with a real mouse + room for a keyboard. */
    @media (pointer: fine) and (min-width: 820px) {
      body.playing #touch { display: none; }
    }
    /* On touch / small screens the on-screen buttons replace the keyboard hint. */
    @media (pointer: coarse), (max-width: 819px) {
      body.playing #hint { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .level-card { transition: none; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="960" height="540"></canvas>
  </div>

  <button id="menu-btn" aria-label="Back to level menu">☰ Menu</button>
  <div id="hint">← → move &nbsp;·&nbsp; space / ↑ jump</div>

  <!-- On-screen touch controls (shown on touch devices / small screens). -->
  <div id="touch">
    <div class="pad">
      <button class="tbtn" data-action="left" aria-label="Move left">◄</button>
      <button class="tbtn" data-action="right" aria-label="Move right">►</button>
    </div>
    <button class="tbtn jump" data-action="jump" aria-label="Jump">JUMP</button>
  </div>

  <!-- Home screen: the level picker. Populated from data/levels.json. -->
  <div id="menu">
    <img class="brand-mark" src="public/nza-logo.svg" alt="" />
    <h1>NZA <span class="accent">Onboarding Game</span></h1>
    <p class="tagline">Pick a level</p>
    <div id="level-list">Loading levels…</div>
    <div class="footer">Net Zero Advisory</div>
  </div>

  <!-- Plain web: no build tool, no framework. Load order matters. -->
  <script src="src/engine/input.js"></script>
  <script src="src/face.js"></script>
  <script src="src/engine/engine.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
