<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NZA Onboarding Game</title>
  <style>
    :root {
      /* NZA palette (full design system applied in Part F) */
      --navy: #0b1220;
      --teal: #2dd4bf;
      --cream: #f5f1e6;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--navy);
      color: var(--cream);
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    #stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
    }
    #game {
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      image-rendering: pixelated;
      background: #1a2438;
      touch-action: none;
    }
    #hint {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      font-size: 13px;
      letter-spacing: 0.08em;
      opacity: 0.55;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ---- Level picker (home screen) ---- */
    #menu {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 24px;
      background: radial-gradient(120% 120% at 50% 0%, #16203a 0%, #0b1220 70%);
      z-index: 10;
    }
    #menu h1 {
      margin: 0;
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 400;
      letter-spacing: 0.01em;
      text-align: center;
    }
    #menu h1 .accent { color: var(--teal); }
    #menu .tagline {
      margin: -14px 0 0;
      opacity: 0.6;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    #level-list {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      max-width: 760px;
    }
    .level-card {
      width: 220px;
      text-align: left;
      background: #131d33;
      border: 1px solid #24304d;
      border-left: 4px solid var(--accent, var(--teal));
      border-radius: 12px;
      padding: 16px 18px;
      color: var(--cream);
      cursor: pointer;
      font: inherit;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }
    .level-card:hover,
    .level-card:focus-visible {
      transform: translateY(-3px);
      background: #18233d;
      outline: none;
    }
    .level-card .name { font-size: 19px; margin-bottom: 4px; }
    .level-card .meta { font-size: 12px; opacity: 0.6; letter-spacing: 0.04em; }
    .level-card .swatch {
      display: inline-block; width: 10px; height: 10px; border-radius: 2px;
      background: var(--accent, var(--teal)); margin-right: 6px; vertical-align: middle;
    }

    /* Menu button shown only while playing */
    #menu-btn {
      position: fixed;
      top: 14px; right: 14px;
      z-index: 9;
      display: none;
      background: #131d33cc;
      color: var(--cream);
      border: 1px solid #24304d;
      border-radius: 8px;
      padding: 8px 14px;
      font: inherit; font-size: 13px;
      letter-spacing: 0.06em;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    body.playing #menu-btn { display: block; }
    body.playing #hint { display: block; }
    body:not(.playing) #hint { display: none; }

    @media (prefers-reduced-motion: reduce) {
      .level-card { transition: none; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="960" height="540"></canvas>
  </div>

  <button id="menu-btn" aria-label="Back to level menu">☰ Menu</button>
  <div id="hint">← → move &nbsp;·&nbsp; space / ↑ jump</div>

  <!-- Home screen: the level picker. Populated from data/levels.json. -->
  <div id="menu">
    <h1>NZA <span class="accent">Onboarding Game</span></h1>
    <p class="tagline">Pick a level</p>
    <div id="level-list">Loading levels…</div>
  </div>

  <!-- Plain web: no build tool, no framework. Load order matters. -->
  <script src="src/engine/input.js"></script>
  <script src="src/engine/engine.js"></script>
  <script src="src/game.js"></script>
</body>
</html>
